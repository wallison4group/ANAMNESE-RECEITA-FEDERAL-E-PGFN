const COLORS = {
  bg: '#2D3134',
  bgCard: '#252a2d',
  bgCardAlt: '#1F2326',
  teal: '#7DD3C4',
  gold: '#C9A86A',

  textSecondary: '#D5DBDE',
  textMuted: '#9CA3AF',
  border: '#46494c',
  borderLight: '#3D4146',
};

function Header() {
  return (
    <div style={{ textAlign: 'center', marginBottom: 8 }}>
      <img
        src={"data:image/jpeg;base64," + FOTO_B64}
        alt="Wallison Ferreira"
        style={{
          width: 96,
          height: 96,
          borderRadius: '50%',
          objectFit: 'cover',
          border: `2px solid ${COLORS.gold}`,
          marginBottom: 14,
        }}
      />
      <div>
        <img
          src={"data:image/png;base64," + ASSINATURA_B64}
          alt="Wallison Ferreira By 4Group"
          style={{ height: 40, filter: 'brightness(0) invert(1)', opacity: 0.9 }}
        />
      </div>
    </div>
  );
}

function ProgressBar({ current, total }) {
  return (
    <div style={{ marginBottom: 32 }}>
      <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
        {Array.from({ length: total }).map((_, i) => (
          <div
            key={i}
            style={{
              flex: 1,
              height: 4,
              borderRadius: 2,
              background: i < current ? COLORS.teal : COLORS.borderLight,
              transition: 'background 0.3s ease',
            }}
          />
        ))}
      </div>
      <div style={{
        fontSize: 12,
        color: COLORS.textMuted,
        textAlign: 'center',
        letterSpacing: 1,
        textTransform: 'uppercase',
      }}>
        Etapa {current} de {total}
      </div>
    </div>
  );
}

function TextInput({ value, onChange, placeholder }) {
  return (
    <textarea
      value={value || ''}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      rows={2}
      style={{
        width: '100%',
        background: COLORS.bgCardAlt,
        border: `1px solid ${COLORS.border}`,
        borderRadius: 6,
        padding: '12px 14px',
        color: COLORS.textPrimary,
        fontSize: 15,
        fontFamily: 'Arial, sans-serif',
        resize: 'vertical',
        outline: 'none',
        boxSizing: 'border-box',
        lineHeight: 1.5,
      }}
      onFocus={(e) => { e.target.style.borderColor = COLORS.teal; }}
      onBlur={(e) => { e.target.style.borderColor = COLORS.border; }}
    />
  );
}

function ChoiceGroup({ opcoes, value, onChange }) {
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
      {opcoes.map((op) => {
        const selected = value === op;
        return (
          <button
            key={op}
            type="button"
            onClick={() => onChange(op)}
            style={{
              padding: '9px 16px',
              borderRadius: 20,
              border: `1px solid ${selected ? COLORS.teal : COLORS.border}`,
              background: selected ? 'rgba(125, 211, 196, 0.12)' : COLORS.bgCardAlt,
              color: selected ? COLORS.teal : COLORS.textSecondary,
              fontSize: 13.5,
              fontFamily: 'Arial, sans-serif',
              fontWeight: selected ? 700 : 400,
              cursor: 'pointer',
              transition: 'all 0.15s ease',
              outline: 'none',
            }}
          >
            {op}
          </button>
        );
      })}
    </div>
  );
}

function QuestionCard({ pergunta, index, value, obsValue, onChange, onObsChange }) {
  return (
    <div style={{
      background: COLORS.bgCard,
      borderRadius: 10,
      padding: '22px 24px',
      marginBottom: 16,
      border: `1px solid ${COLORS.borderLight}`,
    }}>
      <div style={{
        display: 'flex',
        gap: 12,
        marginBottom: 14,
        alignItems: 'flex-start',
      }}>
        <span style={{
          fontFamily: 'Georgia, serif',
          fontSize: 14,
          color: COLORS.gold,
          fontWeight: 700,
          flexShrink: 0,
          marginTop: 1,
        }}>
          {index}
        </span>
        <span style={{
          fontSize: 15.5,
          color: COLORS.textPrimary,
          lineHeight: 1.45,
          fontWeight: 500,
        }}>
          {pergunta.label}
        </span>
      </div>

      {pergunta.tipo === 'texto' && (
        <TextInput
          value={value}
          onChange={(v) => onChange(pergunta.id, v)}
          placeholder={pergunta.placeholder}
        />
      )}

      {pergunta.tipo === 'escolha' && (
        <>
          <ChoiceGroup
            opcoes={pergunta.opcoes}
            value={value}
            onChange={(v) => onChange(pergunta.id, v)}
          />
          {pergunta.comObs && (
            <div style={{ marginTop: 12 }}>
              <TextInput
                value={obsValue}
                onChange={(v) => onObsChange(pergunta.id, v)}
                placeholder={pergunta.obsLabel || 'Observação (opcional)'}
              />
            </div>
          )}
        </>
      )}
    </div>
  );
}

function SummaryView({ respostas, observacoes, onRestart }) {
  const linhas = [];
  linhas.push('ANAMNESE FISCAL E FINANCEIRA');
  linhas.push('Análise de Dívidas Tributárias Junto à Receita Federal e à PGFN');
  linhas.push('');

  ETAPAS.forEach((etapa) => {
    linhas.push('--- ETAPA ' + etapa.id + ': ' + etapa.titulo.toUpperCase() + ' ---');
    linhas.push('');
    etapa.perguntas.forEach((p, i) => {
      const globalIndex = ETAPAS.slice(0, etapa.id - 1).reduce((acc, e) => acc + e.perguntas.length, 0) + i + 1;
      linhas.push(globalIndex + '. ' + p.label);
      const resp = respostas[p.id];
      linhas.push('Resposta: ' + (resp || '(não respondido)'));
      if (p.comObs && observacoes[p.id]) {
        linhas.push('Observação: ' + observacoes[p.id]);
      }
      linhas.push('');
    });
  });

  const textoCompleto = linhas.join('\n');
  const [copiado, setCopiado] = useState(false);

  const copiar = () => {
    navigator.clipboard.writeText(textoCompleto).then(() => {
      setCopiado(true);
      setTimeout(() => setCopiado(false), 2000);
    });
  };

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '40px 20px' }}>
      <Header />
      <div style={{
        height: 2,
        width: 100,
        background: COLORS.gold,
        margin: '24px auto 28px auto',
      }} />
      <h1 style={{
        fontFamily: 'Georgia, serif',
        fontSize: 26,
        fontWeight: 700,
        color: COLORS.teal,
        textAlign: 'center',
        textTransform: 'uppercase',
        marginBottom: 16,
        lineHeight: 1.3,
      }}>
        Anamnese Concluída
      </h1>
      <p style={{
        fontSize: 15,
        color: COLORS.textSecondary,
        textAlign: 'center',
        lineHeight: 1.6,
        marginBottom: 32,
        maxWidth: 560,
        marginLeft: 'auto',
        marginRight: 'auto',
      }}>
        Copie o resumo abaixo e envie por WhatsApp ou e-mail para Wallison Ferreira para dar continuidade à análise da sua dívida tributária.
      </p>

      <button
        onClick={copiar}
        style={{
          display: 'block',
          margin: '0 auto 28px auto',
          padding: '14px 32px',
          borderRadius: 8,
          border: 'none',
          background: copiado ? COLORS.teal : COLORS.gold,
          color: '#1a1a1a',
          fontSize: 15,
          fontWeight: 700,
          fontFamily: 'Arial, sans-serif',
          cursor: 'pointer',
          transition: 'background 0.2s ease',
        }}
      >
        {copiado ? 'Copiado!' : 'Copiar Resumo Completo'}
      </button>

      <div style={{
        background: COLORS.bgCardAlt,
        border: `1px solid ${COLORS.borderLight}`,
        borderRadius: 8,
        padding: 20,
        maxHeight: 400,
        overflowY: 'auto',
        fontFamily: 'monospace',
        fontSize: 12.5,
        color: COLORS.textSecondary,
        whiteSpace: 'pre-wrap',
        lineHeight: 1.6,
      }}>
        {textoCompleto}
      </div>

      <button
        onClick={onRestart}
        style={{
          display: 'block',
          margin: '24px auto 0 auto',
          padding: '10px 20px',
          borderRadius: 6,
          border: `1px solid ${COLORS.border}`,
          background: 'transparent',
          color: COLORS.textMuted,
          fontSize: 13,
          fontFamily: 'Arial, sans-serif',
          cursor: 'pointer',
        }}
      >
        Preencher novamente
      </button>
    </div>
  );
}

function AnamneseFiscal() {
  const [etapaAtual, setEtapaAtual] = useState(0);
  const [respostas, setRespostas] = useState({});
  const [observacoes, setObservacoes] = useState({});
  const [finalizado, setFinalizado] = useState(false);

  const handleChange = (id, value) => {
    setRespostas((prev) => ({ ...prev, [id]: value }));
  };

  const handleObsChange = (id, value) => {
    setObservacoes((prev) => ({ ...prev, [id]: value }));
  };

  const handleRestart = () => {
    setRespostas({});
    setObservacoes({});
    setEtapaAtual(0);
    setFinalizado(false);
  };

  if (finalizado) {
    return (
      <div style={{ background: COLORS.bg, minHeight: '100vh' }}>
        <SummaryView respostas={respostas} observacoes={observacoes} onRestart={handleRestart} />
      </div>
    );
  }

  const etapa = ETAPAS[etapaAtual];
  const isUltima = etapaAtual === ETAPAS.length - 1;
  const globalStart = ETAPAS.slice(0, etapaAtual).reduce((acc, e) => acc + e.perguntas.length, 0);

  return (
    <div style={{ background: COLORS.bg, minHeight: '100vh', paddingBottom: 60 }}>
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '40px 20px 0 20px' }}>
        <Header />
        <div style={{
          height: 2,
          width: 100,
          background: COLORS.gold,
          margin: '24px auto 28px auto',
        }} />

        <h1 style={{
          fontFamily: 'Georgia, serif',
          fontSize: 24,
          fontWeight: 700,
          color: COLORS.teal,
          textAlign: 'center',
          textTransform: 'uppercase',
          marginBottom: 8,
          lineHeight: 1.3,
        }}>
          Anamnese Fiscal e Financeira
        </h1>
        <p style={{
          fontSize: 13,
          color: COLORS.textMuted,
          textAlign: 'center',
          letterSpacing: 1,
          textTransform: 'uppercase',
          marginBottom: 24,
        }}>
          Análise de Dívidas Tributárias · Receita Federal e PGFN
        </p>

        {etapaAtual === 0 && (
          <p style={{
            fontSize: 14.5,
            color: COLORS.textSecondary,
            textAlign: 'center',
            lineHeight: 1.6,
            marginBottom: 28,
            maxWidth: 600,
            marginLeft: 'auto',
            marginRight: 'auto',
          }}>
            Responda as perguntas abaixo como complemento dos documentos apresentados para análise. O objetivo é entender o contexto da dívida, a urgência, a origem percebida, a capacidade de pagamento e as informações que não aparecem claramente nos documentos.
          </p>
        )}

        <ProgressBar current={etapaAtual + 1} total={ETAPAS.length} />

        <h2 style={{
          fontFamily: 'Georgia, serif',
          fontSize: 18,
          fontWeight: 700,
          color: COLORS.textPrimary,
          marginBottom: 20,
          textAlign: 'center',
        }}>
          {etapa.titulo}
        </h2>

        {etapa.perguntas.map((p, i) => (
          <QuestionCard
            key={p.id}
            pergunta={p}
            index={globalStart + i + 1}
            value={respostas[p.id]}
            obsValue={observacoes[p.id]}
            onChange={handleChange}
            onObsChange={handleObsChange}
          />
        ))}

        <div style={{
          display: 'flex',
          justifyContent: 'space-between',
          marginTop: 28,
          gap: 12,
        }}>
          <button
            onClick={() => setEtapaAtual((e) => Math.max(0, e - 1))}
            disabled={etapaAtual === 0}
            style={{
              padding: '12px 24px',
              borderRadius: 8,
              border: `1px solid ${COLORS.border}`,
              background: 'transparent',
              color: etapaAtual === 0 ? COLORS.borderLight : COLORS.textSecondary,
              fontSize: 14,
              fontFamily: 'Arial, sans-serif',
              cursor: etapaAtual === 0 ? 'default' : 'pointer',
              opacity: etapaAtual === 0 ? 0.4 : 1,
            }}
          >
            ← Voltar
          </button>

          {!isUltima ? (
            <button
              onClick={() => setEtapaAtual((e) => Math.min(ETAPAS.length - 1, e + 1))}
              style={{
                padding: '12px 32px',
                borderRadius: 8,
                border: 'none',
                background: COLORS.teal,
                color: '#1a1a1a',
                fontSize: 14,
                fontWeight: 700,
                fontFamily: 'Arial, sans-serif',
                cursor: 'pointer',
              }}
            >
              Próxima Etapa →
            </button>
          ) : (
            <button
              onClick={() => setFinalizado(true)}
              style={{
                padding: '12px 32px',
                borderRadius: 8,
                border: 'none',
                background: COLORS.gold,
                color: '#1a1a1a',
                fontSize: 14,
                fontWeight: 700,
                fontFamily: 'Arial, sans-serif',
                cursor: 'pointer',
              }}
            >
              Finalizar e Ver Resumo
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AnamneseFiscal />);
</script>
</body>
</html>
